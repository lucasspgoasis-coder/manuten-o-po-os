<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referências Poços Artesianos - Fazenda Oásis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Bibliotecas para Exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            color: #0f172a;
        }

        .header-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            border-bottom: 4px solid #1e40af;
        }

        /* Estilo dos Flash Cards */
        .flash-card {
            border-radius: 1.25rem;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .data-tag {
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .icon-box {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .data-tag-label {
            font-size: 10px;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
        }

        .data-tag-value {
            font-size: 17px; /* Letra maior para clareza */
            font-weight: 700;
            color: #0f172a;
        }

        /* Cores Temáticas */
        .bg-brand { background: #eff6ff; color: #2563eb; }
        .bg-model { background: #fff1f2; color: #e11d48; }
        .bg-power { background: #fffbeb; color: #d97706; }
        .bg-depth { background: #f0fdf4; color: #16a34a; }
        .bg-flow  { background: #f5f3ff; color: #7c3aed; }

        /* Área de Exportação Otimizada para Celular/WhatsApp */
        #exportArea {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 600px; /* Largura reduzida para preencher melhor a tela do celular */
            background: #ffffff;
        }

        .export-card-full {
            border: 2px solid #e2e8f0;
            margin-bottom: 20px;
        }

        .official-footer {
            background: #f8fafc;
            border-top: 2px solid #e2e8f0;
            padding: 24px;
            text-align: center;
            font-size: 12px;
            font-weight: 800;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Header Principal -->
    <header class="header-bg text-white shadow-xl mb-10">
        <div class="max-w-[1400px] mx-auto px-6 py-10">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl md:text-4xl font-black tracking-tighter uppercase mb-1">Poços Artesianos</h1>
                    <div class="flex items-center gap-3">
                        <span class="bg-blue-500 text-white text-[10px] font-black px-3 py-1 rounded-full">ATIVOS OFICIAIS</span>
                        <h2 class="text-xl font-semibold text-blue-100/90 tracking-tight">Fazenda Oásis</h2>
                    </div>
                </div>
                <img src="https://i.imgur.com/rB1Lk8y.png" alt="Logo" class="w-20 h-20 object-contain">
            </div>
        </div>
    </header>

    <div class="max-w-[1400px] mx-auto px-6">
        <!-- Barra de Ações -->
        <div class="flex flex-wrap gap-3 mb-10 justify-end">
            <button onclick="exportarExcel()" class="bg-white hover:bg-slate-50 text-slate-700 font-bold py-3 px-6 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-2 transition-all text-xs uppercase">
                <i class="fas fa-file-excel text-green-600"></i>
                <span>Planilha</span>
            </button>
            <button onclick="exportar('jpg')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-xl shadow-lg flex items-center space-x-3 transition-all text-sm uppercase tracking-wider">
                <i class="fab fa-whatsapp text-lg"></i>
                <span>Gerar Foto p/ WhatsApp</span>
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Formulário de Cadastro -->
            <div class="lg:col-span-4">
                <div class="bg-white rounded-3xl p-8 shadow-xl border border-slate-200 sticky top-10">
                    <h2 id="formTitle" class="text-lg font-black text-slate-800 mb-8 flex items-center uppercase">
                        <i class="fas fa-plus-circle text-blue-600 mr-3"></i>
                        Novo Poço
                    </h2>
                    
                    <form id="pocoForm" class="space-y-4">
                        <input type="hidden" id="editId" value="">

                        <div class="space-y-4">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1">Número do Poço</label>
                                <select id="bomba" required class="w-full px-4 py-4 rounded-xl border border-slate-200 font-bold text-slate-700 bg-white">
                                    <script>
                                        for(let i=1; i<=20; i++) {
                                            let p = `Poço ${String(i).padStart(2, '0')}`;
                                            document.write(`<option value="${p}">${p}</option>`);
                                        }
                                    </script>
                                </select>
                            </div>

                            <input type="text" id="marca" required class="w-full px-4 py-4 rounded-xl border border-slate-200 font-bold uppercase" placeholder="MARCA DA BOMBA">
                            <input type="text" id="modelo" required class="w-full px-4 py-4 rounded-xl border border-slate-200 font-bold uppercase" placeholder="MODELO TÉCNICO">
                            
                            <div class="grid grid-cols-2 gap-4">
                                <input type="text" id="cv" required class="w-full px-4 py-4 rounded-xl border border-slate-200 font-bold" placeholder="POTÊNCIA (CV)">
                                <input type="number" id="profundidade" required class="w-full px-4 py-4 rounded-xl border border-slate-200 font-bold" placeholder="PROF. (M)">
                            </div>

                            <input type="number" id="vazao" required class="w-full px-4 py-4 rounded-xl border border-slate-200 font-bold text-blue-600" placeholder="VAZÃO INICIAL (L/H)">
                        </div>

                        <button type="submit" id="submitBtn" class="w-full bg-slate-900 hover:bg-black text-white font-black py-5 rounded-2xl shadow-lg transition-all uppercase text-sm mt-4">
                            Salvar Ativo
                        </button>
                        <button type="button" id="cancelEditBtn" onclick="resetForm()" class="hidden w-full text-slate-400 font-bold text-[10px] uppercase py-2">
                            Cancelar Edição
                        </button>
                    </form>
                </div>
            </div>

            <!-- Lista de Cards -->
            <div class="lg:col-span-8">
                <div id="cardsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                
                <div id="emptyState" class="flex flex-col items-center justify-center py-32 bg-slate-50 rounded-[3rem] border-2 border-dashed border-slate-200">
                    <i class="fas fa-droplet text-slate-200 text-6xl mb-4"></i>
                    <p class="text-slate-400 font-black uppercase text-[10px] tracking-widest">Aguardando registros...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ÁREA DE EXPORTAÇÃO (FORMATO VERTICAL P/ WHATSAPP) -->
    <div id="exportArea">
        <div class="header-bg p-10 text-white flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black uppercase">Relatório de Ativos</h1>
                <h2 class="text-lg opacity-80">Fazenda Oásis • Dados Técnicos</h2>
                <p id="exportTimestamp" class="text-[10px] mt-2 font-bold opacity-60"></p>
            </div>
            <img src="https://i.imgur.com/rB1Lk8y.png" style="width: 80px; height: 80px;">
        </div>
        
        <div class="p-8 bg-white" id="exportList">
            <!-- Cards entrarão aqui em coluna única -->
        </div>

        <div class="official-footer">
            <p>Sistema de Gestão de Poços - Fazenda Oásis</p>
            <p class="text-[10px] mt-1 text-blue-600">Documento de Referência Interna</p>
        </div>
    </div>

    <script>
        const cardsGrid = document.getElementById('cardsGrid');
        const exportList = document.getElementById('exportList');
        const emptyState = document.getElementById('emptyState');
        const editIdInput = document.getElementById('editId');
        const formTitle = document.getElementById('formTitle');
        const submitBtn = document.getElementById('submitBtn');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        
        let registros = [];

        document.getElementById('pocoForm').addEventListener('submit', e => {
            e.preventDefault();
            const currentEditId = editIdInput.value;

            const reg = {
                id: currentEditId ? parseInt(currentEditId) : Date.now(),
                bomba: document.getElementById('bomba').value,
                marca: document.getElementById('marca').value.toUpperCase(),
                modelo: document.getElementById('modelo').value.toUpperCase(),
                cv: document.getElementById('cv').value,
                profundidade: document.getElementById('profundidade').value,
                vazao: document.getElementById('vazao').value
            };
            
            if (currentEditId) {
                const index = registros.findIndex(r => r.id === reg.id);
                if (index !== -1) registros[index] = reg;
            } else {
                registros.push(reg);
            }
            
            render();
            resetForm();
        });

        function resetForm() {
            document.getElementById('pocoForm').reset();
            editIdInput.value = "";
            formTitle.innerHTML = `<i class="fas fa-plus-circle text-blue-600 mr-3"></i> Novo Poço`;
            submitBtn.innerText = "Salvar Ativo";
            cancelEditBtn.classList.add('hidden');
        }

        function editarRegistro(id) {
            const reg = registros.find(r => r.id === id);
            if (!reg) return;
            editIdInput.value = reg.id;
            document.getElementById('bomba').value = reg.bomba;
            document.getElementById('marca').value = reg.marca;
            document.getElementById('modelo').value = reg.modelo;
            document.getElementById('cv').value = reg.cv;
            document.getElementById('profundidade').value = reg.profundidade;
            document.getElementById('vazao').value = reg.vazao;
            formTitle.innerHTML = `<i class="fas fa-edit text-amber-500 mr-3"></i> Editando Ativo`;
            submitBtn.innerText = "Atualizar Dados";
            cancelEditBtn.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function excluirRegistro(id) {
            if(confirm("Excluir este poço do histórico?")) {
                registros = registros.filter(r => r.id !== id);
                render();
            }
        }

        function render() {
            emptyState.classList.toggle('hidden', registros.length > 0);
            const sorted = [...registros].sort((a, b) => a.bomba.localeCompare(b.bomba));
            
            // Grid do Site (2 colunas)
            cardsGrid.innerHTML = sorted.map(r => generateCardHtml(r, true)).join('');
            
            // Lista de Exportação (1 coluna larga p/ WhatsApp)
            exportList.innerHTML = sorted.map(r => generateCardHtml(r, false)).join('');
            
            document.getElementById('exportTimestamp').innerText = `DATA: ${new Date().toLocaleString('pt-BR')}`;
        }

        function generateCardHtml(r, showActions) {
            const actions = showActions ? `
                <div class="flex gap-2">
                    <button onclick="editarRegistro(${r.id})" class="w-10 h-10 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center hover:bg-blue-600 hover:text-white transition-all">
                        <i class="fas fa-pen text-xs"></i>
                    </button>
                    <button onclick="excluirRegistro(${r.id})" class="w-10 h-10 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center hover:bg-red-600 hover:text-white transition-all">
                        <i class="fas fa-trash text-xs"></i>
                    </button>
                </div>
            ` : '';

            return `
                <div class="flash-card ${!showActions ? 'export-card-full mb-6' : ''}">
                    <div class="px-6 py-4 bg-slate-900 text-white flex justify-between items-center">
                        <span class="text-sm font-black uppercase tracking-widest">${r.bomba}</span>
                        ${actions}
                    </div>
                    
                    <div class="p-6 space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="data-tag">
                                <div class="icon-box bg-brand"><i class="fas fa-industry"></i></div>
                                <div class="tag-content">
                                    <span class="data-tag-label">Fabricante</span>
                                    <span class="data-tag-value">${r.marca}</span>
                                </div>
                            </div>
                            <div class="data-tag">
                                <div class="icon-box bg-model"><i class="fas fa-microchip"></i></div>
                                <div class="tag-content">
                                    <span class="data-tag-label">Modelo</span>
                                    <span class="data-tag-value">${r.modelo}</span>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="data-tag">
                                <div class="icon-box bg-power"><i class="fas fa-bolt"></i></div>
                                <div class="tag-content">
                                    <span class="data-tag-label">Potência</span>
                                    <span class="data-tag-value">${r.cv} Cv</span>
                                </div>
                            </div>
                            <div class="data-tag">
                                <div class="icon-box bg-depth"><i class="fas fa-ruler-vertical"></i></div>
                                <div class="tag-content">
                                    <span class="data-tag-label">Profundidade</span>
                                    <span class="data-tag-value">${r.profundidade} m</span>
                                </div>
                            </div>
                        </div>

                        <div class="data-tag border-blue-100 bg-blue-50">
                            <div class="icon-box bg-flow"><i class="fas fa-droplet"></i></div>
                            <div class="tag-content">
                                <span class="data-tag-label text-blue-600">Vazão Inicial Medida</span>
                                <span class="text-2xl font-black text-blue-900">${Number(r.vazao).toLocaleString('pt-BR')} <small class="text-xs opacity-50 font-bold uppercase">L/h</small></span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function exportar(tipo) {
            if(registros.length === 0) return;
            const area = document.getElementById('exportArea');
            const canvas = await html2canvas(area, { 
                scale: 3, 
                useCORS: true, 
                backgroundColor: '#ffffff'
            });

            if (tipo === 'jpg') {
                const link = document.createElement('a');
                link.download = `pocos-artesianos-oasis.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                link.click();
            }
        }

        function exportarExcel() {
            if (registros.length === 0) return;
            const ws = XLSX.utils.json_to_sheet(registros.map(r => ({
                'POÇO': r.bomba,
                'MARCA': r.marca,
                'MODELO': r.modelo,
                'CV': r.cv,
                'PROF. (M)': r.profundidade,
                'VAZÃO (L/H)': r.vazao
            })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Poços");
            XLSX.writeFile(wb, `pocos-oasis.xlsx`);
        }
    </script>
</body>
</html>
